<!doctype html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>Settings</title>
<style>
:root{--bg:oklch(98% 0.004 240);--surface:#fff;--fg:oklch(20% 0.02 240);--muted:oklch(48% 0.018 240);--border:oklch(90% 0.006 240);--accent:oklch(56% 0.12 170)}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:"SF Pro Text","Segoe UI",sans-serif;color:var(--fg)}
.app{padding:52px 16px 94px}.app h1{margin:0 0 12px;font-size:36px}.card{background:#fff;border:1px solid var(--border);border-radius:18px;padding:14px;margin-top:12px}.title{font-size:25px;font-weight:740}
.row{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-top:12px}.label{font-size:21px}.desc{color:var(--muted);margin-top:4px}.value{font-family:"JetBrains Mono",monospace;color:#35526b;font-size:20px;margin-top:8px}
.switch{width:66px;height:38px;border-radius:999px;background:#d3dce7;border:0;position:relative}.knob{position:absolute;top:4px;left:4px;width:30px;height:30px;border-radius:999px;background:#fff;transition:.2s}.switch.on{background:#54d6bd}.switch.on .knob{left:32px}
.save{position:fixed;left:16px;right:16px;bottom:18px;min-height:56px;border:0;border-radius:16px;background:var(--accent);font-size:21px;font-weight:760;color:#073f34}
</style></head>
<body><div class="app"><h1>Settings</h1>
<section class="card"><div class="title">Storage Access</div><div class="desc">All files access is granted. Bifrost can read and write server files directly.</div></section>
<section class="card"><div class="title">Server Directory</div><div class="row"><div><div class="label">Use default storage</div><div class="value">/storage/emulated/0/Bifrost</div></div><button class="switch on" id="defaultSwitch"><span class="knob"></span></button></div><div class="value" style="margin-top:14px">Active server root\n/storage/emulated/0/Bifrost</div></section>
<section class="card"><div class="title">Runtime</div><div class="row"><div><div class="label">Auto restart after crash</div><div class="desc">Attempts one restart before marking failed.</div></div><button class="switch" id="restartSwitch"><span class="knob"></span></button></div></section>
</div><button class="save" id="saveBtn">Save Settings</button>
<script>
for(const sw of document.querySelectorAll('.switch')){sw.onclick=()=>sw.classList.toggle('on');}
document.getElementById('saveBtn').onclick=(e)=>{const old=e.target.textContent;e.target.textContent='Saved';setTimeout(()=>e.target.textContent=old,900);};
</script></body></html>
