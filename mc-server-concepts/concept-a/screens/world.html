<!doctype html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>World</title>
<style>
:root{--bg:oklch(98% 0.004 240);--surface:#fff;--fg:oklch(20% 0.02 240);--muted:oklch(48% 0.018 240);--border:oklch(90% 0.006 240);--accent:oklch(56% 0.12 170);--accent2:oklch(66% 0.1 220)}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:"SF Pro Text","Segoe UI",sans-serif;color:var(--fg)}
.app{padding:52px 16px 24px}.head{display:flex;justify-content:space-between;align-items:center}.head h1{margin:0;font-size:35px}
.card{margin-top:12px;background:#fff;border:1px solid var(--border);border-radius:18px;padding:12px}.tools{display:grid;grid-template-columns:1fr 1fr;gap:8px}.tools button{min-height:50px;border:0;border-radius:12px;font-weight:700}.primary{background:var(--accent);color:#03392f}.soft{background:#eef3f8}
.list{display:grid;gap:8px;margin-top:12px}.row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px;background:#f4f8fb;border:1px solid #dfe8f1;border-radius:12px;padding:10px}
.meta{color:var(--muted);font-size:14px}.pill{padding:7px 10px;border-radius:999px;background:#d7f5eb;color:#075d4c;font-size:13px;font-weight:700}
progress{width:100%;height:12px;margin-top:8px}
</style></head>
<body><div class="app"><div class="head"><h1>World</h1><button style="width:48px;height:48px;border:1px solid var(--border);border-radius:12px;background:#fff">↻</button></div>
<section class="card"><div class="tools"><button class="primary" id="backupBtn">Create Backup</button><button class="soft">Open World Folder</button><button class="soft">Upload World</button><button class="soft">Generate New World</button></div><progress id="progress" value="0" max="100" hidden></progress></section>
<section class="card"><h2 style="margin:0;font-size:24px">Recent Backups</h2><div class="list" id="backups"><article class="row"><div><strong>ggh_2026-05-18_2201.zip</strong><div class="meta">1.4 GB • Local storage</div></div><span class="pill">Healthy</span></article><article class="row"><div><strong>ggh_2026-05-17_2030.zip</strong><div class="meta">1.3 GB • Local storage</div></div><span class="pill">Healthy</span></article></div></section>
</div>
<script>
const btn=document.getElementById('backupBtn');const list=document.getElementById('backups');const p=document.getElementById('progress');
btn.onclick=()=>{btn.disabled=true;btn.textContent='Backing up...';p.hidden=false;p.value=0;const iv=setInterval(()=>{p.value+=12;if(p.value>=100){clearInterval(iv);const now=new Date();const stamp=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;const row=document.createElement('article');row.className='row';row.innerHTML=`<div><strong>ggh_${stamp}.zip</strong><div class="meta">1.4 GB • Local storage</div></div><span class="pill">Healthy</span>`;list.prepend(row);btn.disabled=false;btn.textContent='Create Backup';setTimeout(()=>{p.hidden=true;},500);} },140);
};
</script></body></html>
