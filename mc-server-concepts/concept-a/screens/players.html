<!doctype html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>Players</title>
<style>
:root{--bg:oklch(98% 0.004 240);--surface:#fff;--fg:oklch(20% 0.02 240);--muted:oklch(48% 0.018 240);--border:oklch(90% 0.006 240);--accent:oklch(56% 0.12 170);}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:"SF Pro Text","Segoe UI",sans-serif;color:var(--fg)}
.app{padding:52px 16px 28px}.title{font-size:36px;font-weight:780;margin:0}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.tab{min-height:48px;border:1px solid var(--border);border-radius:12px;background:#fff;font-weight:700}.tab.active{background:#d6f4eb;border-color:#b6e8db;color:#005949}
.panel{background:#fff;border:1px solid var(--border);border-radius:18px;padding:12px}.entry{display:flex;gap:8px}input{flex:1;min-height:48px;border:1px solid var(--border);border-radius:12px;padding:0 12px;font-size:18px}button{min-height:48px;border:0;border-radius:12px;padding:0 14px;font-size:17px;font-weight:700}.add{background:var(--accent);color:#00382e}
ul{list-style:none;padding:0;margin:12px 0 0;display:grid;gap:8px}.item{display:flex;justify-content:space-between;align-items:center;background:#f4f8fb;border:1px solid #e3eaf0;border-radius:12px;padding:10px 12px}.remove{background:#ffe7e8;color:#871c29}
</style></head>
<body><div class="app"><h1 class="title">Players</h1>
<div class="tabs"><button class="tab active" data-list="whitelist">Whitelist</button><button class="tab" data-list="ops">Operators</button><button class="tab" data-list="blacklist">Blacklist</button></div>
<section class="panel"><div class="entry"><input id="playerInput" placeholder="Player name" /><button class="add" id="addBtn">Add</button></div><ul id="list"></ul></section></div>
<script>
const data={whitelist:['Alex','Noor'],ops:['AdminKai'],blacklist:[]};let current='whitelist';
const list=document.getElementById('list');const input=document.getElementById('playerInput');
function render(){list.innerHTML='';const rows=data[current];if(!rows.length){const li=document.createElement('li');li.className='item';li.textContent=`No ${current} entries yet.`;list.append(li);return;}for(const name of rows){const li=document.createElement('li');li.className='item';li.innerHTML=`<span>${name}</span>`;const b=document.createElement('button');b.textContent='Remove';b.className='remove';b.onclick=()=>{data[current]=data[current].filter(v=>v!==name);render();};li.appendChild(b);list.append(li);}}
for(const tab of document.querySelectorAll('.tab')){tab.onclick=()=>{document.querySelector('.tab.active').classList.remove('active');tab.classList.add('active');current=tab.dataset.list;render();};}
document.getElementById('addBtn').onclick=()=>{const value=input.value.trim();if(!value)return;if(!data[current].includes(value))data[current].push(value);input.value='';render();};
render();
</script></body></html>
