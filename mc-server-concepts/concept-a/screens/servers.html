<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Servers</title>
<style>
:root { --bg: oklch(98% 0.004 240); --surface: #fff; --fg: oklch(20% 0.02 240); --muted: oklch(48% 0.018 240); --border: oklch(90% 0.006 240); --accent: oklch(56% 0.12 170); --accent2: oklch(66% 0.1 220); }
* { box-sizing: border-box; }
body { margin: 0; font-family: "SF Pro Text", "Segoe UI", sans-serif; background: var(--bg); color: var(--fg); }
.app { padding: 52px 18px 94px; }
.top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.top h1 { margin: 0; font-size: 36px; letter-spacing: -0.03em; }
.icon-btn { width: 48px; height: 48px; border-radius: 14px; border: 1px solid var(--border); background: var(--surface); font-size: 22px; }
.stack { display: grid; gap: 14px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 14px; box-shadow: 0 8px 20px rgba(20,28,40,.06); }
.row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.title { font-size: 29px; font-weight: 760; }
.sub { color: var(--muted); margin-top: 4px; }
.chip { padding: 8px 12px; border-radius: 999px; font-size: 14px; font-weight: 700; background: color-mix(in oklab, var(--accent2) 20%, white); color: color-mix(in oklab, var(--accent) 60%, black); }
.stats { margin: 14px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat { background: color-mix(in oklab, var(--accent2) 8%, white); border: 1px solid var(--border); border-radius: 14px; padding: 10px; }
.stat b { display: block; font-size: 22px; margin-top: 4px; }
.actions { display: grid; grid-template-columns: 1fr 1fr 48px; gap: 10px; }
button { min-height: 48px; border: 0; border-radius: 14px; font-weight: 700; font-size: 17px; }
.start { background: var(--accent); color: #03342d; }
.stop { background: #d8dee7; color: #6f7784; }
.more { background: #eef3f8; font-size: 24px; }
.fab { position: fixed; right: 20px; bottom: 22px; width: 64px; height: 64px; border-radius: 22px; border: 0; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #053740; font-size: 34px; box-shadow: 0 18px 30px rgba(0,100,120,.3); }
</style>
</head>
<body>
<div class="app">
  <div class="top"><h1>Bifrost Servers</h1><button class="icon-btn">⚙</button></div>
  <section class="stack" id="serverList">
    <article class="card" data-state="offline">
      <div class="row"><div><div class="title">ggh</div><div class="sub">Paper • 1.21</div></div><span class="chip">Offline</span></div>
      <div class="stats"><div class="stat">Allocated RAM<b>4.5 GB</b></div><div class="stat">Console<b>Ready</b></div></div>
      <div class="actions"><button class="start">Start</button><button class="stop" disabled>Stop</button><button class="more">☰</button></div>
    </article>
    <article class="card" data-state="offline">
      <div class="row"><div><div class="title">gv</div><div class="sub">Paper • 1.21.2</div></div><span class="chip">Offline</span></div>
      <div class="stats"><div class="stat">Allocated RAM<b>5.4 GB</b></div><div class="stat">Console<b>Ready</b></div></div>
      <div class="actions"><button class="start">Start</button><button class="stop" disabled>Stop</button><button class="more">☰</button></div>
    </article>
  </section>
</div>
<button class="fab">＋</button>
<script>
for (const card of document.querySelectorAll('.card')) {
  const start = card.querySelector('.start');
  const stop = card.querySelector('.stop');
  const chip = card.querySelector('.chip');
  start.addEventListener('click', () => {
    card.dataset.state = 'online';
    start.textContent = 'Running';
    start.disabled = true;
    stop.disabled = false;
    stop.style.background = '#ffcdd2';
    stop.style.color = '#7a111f';
    chip.textContent = 'Online';
    chip.style.background = '#c8f1e8';
    chip.style.color = '#0d6a55';
  });
  stop.addEventListener('click', () => {
    card.dataset.state = 'offline';
    start.textContent = 'Start';
    start.disabled = false;
    stop.disabled = true;
    stop.style.background = '#d8dee7';
    stop.style.color = '#6f7784';
    chip.textContent = 'Offline';
    chip.style.background = 'color-mix(in oklab, var(--accent2) 20%, white)';
    chip.style.color = 'color-mix(in oklab, var(--accent) 60%, black)';
  });
}
</script>
</body>
</html>
