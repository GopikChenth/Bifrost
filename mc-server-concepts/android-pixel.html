<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Android Frame</title>
  <style>
    :root {
      color-scheme: dark;
      --shell: #111418;
      --bezel: #0b0d10;
      --frame-border: #222831;
      --nav-pill: #eef1f4;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: "Roboto", "Noto Sans", system-ui, sans-serif;
      display: grid;
      place-items: center;
    }
    .phone {
      width: 412px;
      height: 900px;
      border-radius: 42px;
      border: 2px solid var(--frame-border);
      background: var(--shell);
      padding: 10px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
    }
    .inner {
      width: 100%;
      height: 100%;
      background: #000;
      border-radius: 34px;
      overflow: hidden;
      position: relative;
    }
    .status {
      position: absolute;
      top: 10px;
      left: 14px;
      right: 14px;
      height: 26px;
      z-index: 3;
      color: #f6f8fa;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      letter-spacing: 0.02em;
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
    }
    .status .right {
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0.92;
    }
    .dot, .bar {
      display: inline-block;
      background: #f6f8fa;
      border-radius: 999px;
    }
    .dot { width: 4px; height: 4px; }
    .bar { width: 12px; height: 3px; }
    .camera {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: radial-gradient(circle at 35% 35%, #4b5563, #0b0f14 60%);
      border: 1px solid #1f2937;
      z-index: 4;
      pointer-events: none;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #111;
    }
    .nav {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 118px;
      height: 5px;
      border-radius: 999px;
      background: rgba(246, 248, 250, 0.85);
      z-index: 4;
      pointer-events: none;
    }
    .fallback {
      color: #d1d7de;
      font-size: 14px;
      padding: 18px;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="inner">
      <div class="status">
        <span>8:54</span>
        <span class="right"><span class="bar"></span><span class="dot"></span><span>5G</span><span>47%</span></span>
      </div>
      <div class="camera" aria-hidden="true"></div>
      <iframe id="screen" title="App screen"></iframe>
      <div class="nav" aria-hidden="true"></div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const screen = params.get('screen');
    const frame = document.getElementById('screen');
    if (screen) {
      frame.src = screen;
    } else {
      const fallback = document.createElement('div');
      fallback.className = 'fallback';
      fallback.textContent = 'No screen path provided.';
      document.querySelector('.inner').appendChild(fallback);
      frame.remove();
    }
  </script>
</body>
</html>
