<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Server</title>
<style>:root{--bg:#f2eedf;--paper:#fbf8ee;--ink:#1f2318;--line:#3f462f;--accent:#7aa64f;--accent2:#4a89a4}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:"IBM Plex Mono","JetBrains Mono",monospace;color:var(--ink)}.app{padding:52px 16px 88px}.top{display:flex;justify-content:space-between;align-items:center}.badge{padding:6px 10px;border:2px solid var(--line);background:#ded9c4;font-weight:700}.hero{margin-top:12px;border:2px solid var(--line);background:linear-gradient(135deg,#dce7c6,#c9dfeb);padding:14px}.hero h1{margin:0;font-size:40px}.hero p{margin:6px 0 0;color:#2b3f2f}
.ctrl{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}.ctrl button{min-height:48px;border:2px solid var(--line);font-weight:700}.go{background:#cde3b1}.halt{background:#f4d6d3}.rst{background:#d7e6ec}
.card{margin-top:10px;background:var(--paper);border:2px solid var(--line);padding:10px}.ip{font-size:26px;font-weight:700}.copy{min-height:46px;border:2px solid var(--line);background:#d7e6ec;padding:0 10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.tile{border:2px solid #8f9678;background:#edf1df;padding:8px}.tile b{display:block;margin-top:4px;font-size:20px}
</style></head><body><div class="app"><div class="top"><div style="font-size:33px;font-weight:700">ggh</div><span class="badge" id="state">Offline</span></div><section class="hero"><h1>ggh</h1><p>Paper runtime / ready for launch</p></section><div class="ctrl"><button id="go" class="go">Ignite</button><button id="halt" class="halt" disabled>Cut</button><button id="rst" class="rst">Restart</button></div><section class="card"><div style="display:flex;justify-content:space-between;gap:8px;align-items:center"><div><div>LAN</div><div class="ip" id="ip">100.104.51.112:25565</div></div><button class="copy" id="copy">Copy</button></div></section><section class="grid"><article class="tile">Players<b>0 / 20</b></article><article class="tile">RAM<b id="ram">0.7 GB</b></article><article class="tile">Version<b>1.21</b></article><article class="tile">Path<b>/Bifrost/ggh</b></article></section></div>
<script>const go=document.getElementById('go'),halt=document.getElementById('halt'),state=document.getElementById('state');go.onclick=()=>{go.disabled=true;halt.disabled=false;state.textContent='Online';state.style.background='#cde3b1';document.getElementById('ram').textContent='2.2 GB';};halt.onclick=()=>{go.disabled=false;halt.disabled=true;state.textContent='Offline';state.style.background='#ded9c4';document.getElementById('ram').textContent='0.7 GB';};document.getElementById('rst').onclick=()=>{state.textContent='Restarting';setTimeout(()=>state.textContent='Online',700)};document.getElementById('copy').onclick=()=>navigator.clipboard?.writeText(document.getElementById('ip').textContent);</script></body></html>
