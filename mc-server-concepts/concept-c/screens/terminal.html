<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Terminal</title>
<style>:root{--bg:#f2eedf;--paper:#fbf8ee;--ink:#1f2318;--line:#3f462f;--screen:#142015;--phosphor:#9ef57c}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:"IBM Plex Mono","JetBrains Mono",monospace;color:var(--ink)}.app{padding:52px 16px 92px}.head{display:flex;justify-content:space-between;align-items:center}.head h1{margin:0;font-size:32px}.state{padding:6px 10px;border:2px solid var(--line);background:#ded9c4;font-weight:700}.console{margin-top:12px;min-height:658px;background:repeating-linear-gradient(180deg,#101910 0,#101910 26px,#0f170f 26px,#0f170f 52px);border:2px solid #324d34;color:var(--phosphor);padding:14px;font-size:20px;line-height:1.4;white-space:pre-wrap;overflow:auto}.composer{position:fixed;left:16px;right:16px;bottom:16px;display:flex;gap:8px}.composer input{flex:1;min-height:50px;border:2px solid var(--line);background:var(--paper);padding:0 10px;font-size:18px}.composer button{min-height:50px;border:2px solid var(--line);background:#cde3b1;font-weight:700}
</style></head><body><div class="app"><div class="head"><h1>ggh Console</h1><span class="state">Offline</span></div><div class="console" id="out">BIFROST> bind terminal ggh\nTYPE> paper 1.21\nSTATE> stopped\n\nNo output yet.</div></div><form class="composer" id="f"><input id="cmd" placeholder="command e.g. list"/><button>Emit</button></form>
<script>const f=document.getElementById('f'),i=document.getElementById('cmd'),o=document.getElementById('out');f.onsubmit=e=>{e.preventDefault();const v=i.value.trim();if(!v)return;o.textContent += `\n\n> ${v}\n[ok] queued`;i.value='';o.scrollTop=o.scrollHeight;};</script>
</body></html>
