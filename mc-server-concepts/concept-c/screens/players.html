<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Players</title>
<style>:root{--bg:#f2eedf;--paper:#fbf8ee;--ink:#1f2318;--line:#3f462f;--accent:#7aa64f;--danger:#b03c32}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:"IBM Plex Mono","JetBrains Mono",monospace;color:var(--ink)}.app{padding:52px 16px 28px}.app h1{margin:0;font-size:32px}.tabs{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}.tab{min-height:48px;border:2px solid var(--line);background:var(--paper);padding:0 12px;font-weight:700}.tab.active{background:#d9e9c4}.panel{border:2px solid var(--line);background:var(--paper);padding:10px}.entry{display:flex;gap:8px}.entry input{flex:1;min-height:48px;border:2px solid #86936e;background:#f5f3e7;padding:0 10px;font-size:18px}.add{min-height:48px;border:2px solid var(--line);background:#cde3b1;font-weight:700}.list{display:grid;gap:8px;margin-top:10px}.item{display:flex;justify-content:space-between;align-items:center;border:2px solid #8f9678;background:#edf1df;padding:8px}.rm{min-height:38px;border:2px solid #7b3229;background:#f4d6d3;color:#6c271f;font-weight:700}
</style></head><body><div class="app"><h1>Player Lists</h1><div class="tabs"><button class="tab active" data-k="whitelist">Whitelist</button><button class="tab" data-k="ops">Ops</button><button class="tab" data-k="ban">Blacklist</button></div><section class="panel"><div class="entry"><input id="name" placeholder="player"/><button class="add" id="add">Add</button></div><div class="list" id="list"></div></section></div>
<script>const data={whitelist:['Alex'],ops:['AdminKai'],ban:[]};let k='whitelist';const list=document.getElementById('list');function draw(){list.innerHTML='';const rows=data[k];if(!rows.length){const d=document.createElement('div');d.className='item';d.textContent='No entries';list.append(d);return;}rows.forEach(n=>{const r=document.createElement('div');r.className='item';r.innerHTML=`<span>${n}</span>`;const b=document.createElement('button');b.className='rm';b.textContent='Del';b.onclick=()=>{data[k]=data[k].filter(x=>x!==n);draw();};r.append(b);list.append(r);});}document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelector('.tab.active').classList.remove('active');t.classList.add('active');k=t.dataset.k;draw();});document.getElementById('add').onclick=()=>{const v=document.getElementById('name').value.trim();if(v&&!data[k].includes(v))data[k].push(v);document.getElementById('name').value='';draw();};draw();</script>
</body></html>
