<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>World</title>
<style>:root{--bg:#f2eedf;--paper:#fbf8ee;--ink:#1f2318;--line:#3f462f;--accent:#7aa64f;--accent2:#4a89a4}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:"IBM Plex Mono","JetBrains Mono",monospace;color:var(--ink)}.app{padding:52px 16px 26px}.app h1{margin:0;font-size:32px}.card{margin-top:12px;border:2px solid var(--line);background:var(--paper);padding:10px}.tools{display:grid;grid-template-columns:1fr 1fr;gap:8px}.tools button{min-height:48px;border:2px solid var(--line);font-weight:700;background:#d7e6ec}.tools .main{background:#cde3b1}.rows{display:grid;gap:8px;margin-top:10px}.row{display:grid;grid-template-columns:1fr auto;align-items:center;border:2px solid #8f9678;background:#edf1df;padding:8px}.ok{padding:6px 9px;border:2px solid #5a7f38;background:#d9e9c4;font-size:12px;font-weight:700}progress{width:100%;height:12px;margin-top:8px}
</style></head><body><div class="app"><h1>World Workbench</h1><section class="card"><div class="tools"><button class="main" id="mk">Craft Backup</button><button>Open Folder</button><button>Upload World</button><button>Generate Chunk Map</button></div><progress id="p" value="0" max="100" hidden></progress></section><section class="card"><div style="font-size:22px;font-weight:700">Backup Crates</div><div class="rows" id="rows"><article class="row"><div><strong>ggh_2026-05-18_2201.zip</strong><div>1.4 GB / local</div></div><span class="ok">HEALTHY</span></article></div></section></div>
<script>const mk=document.getElementById('mk'),p=document.getElementById('p'),rows=document.getElementById('rows');mk.onclick=()=>{mk.disabled=true;mk.textContent='Crafting...';p.hidden=false;p.value=0;const t=setInterval(()=>{p.value+=14;if(p.value>=100){clearInterval(t);const r=document.createElement('article');r.className='row';r.innerHTML='<div><strong>ggh_2026-05-19_new.zip</strong><div>1.4 GB / local</div></div><span class="ok">HEALTHY</span>';rows.prepend(r);mk.disabled=false;mk.textContent='Craft Backup';setTimeout(()=>p.hidden=true,400);}},120);};</script>
</body></html>
