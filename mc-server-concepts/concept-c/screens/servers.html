<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Servers</title>
<style>:root{--bg:#f2eedf;--paper:#fbf8ee;--ink:#1f2318;--line:#3f462f;--accent:#7aa64f;--accent2:#4a89a4;--danger:#b03c32}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:"IBM Plex Mono","JetBrains Mono",monospace;color:var(--ink)}.app{padding:52px 16px 92px}.head{display:flex;justify-content:space-between;align-items:center}.head h1{margin:0;font-size:32px}.gear{width:48px;height:48px;border:2px solid var(--line);background:var(--paper)}.list{display:grid;gap:12px;margin-top:12px}.card{background:var(--paper);border:2px solid var(--line);padding:10px;box-shadow:4px 4px 0 #cfc8af}.row{display:flex;justify-content:space-between;align-items:center}.name{font-size:27px;font-weight:700}.state{padding:5px 9px;border:2px solid var(--line);background:#ded9c4;font-weight:700}.meta{color:#4e5640}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}.m{border:2px solid #8f9678;background:#edf1df;padding:8px}.m b{display:block;font-size:20px}
.actions{display:grid;grid-template-columns:1fr 1fr 48px;gap:8px}.actions button{min-height:48px;border:2px solid var(--line);font-weight:700;background:#e4ead3}.start{background:#cde3b1}.stop{background:#f4d6d3;color:#7e2b25}.fab{position:fixed;right:18px;bottom:18px;width:64px;height:64px;border:2px solid var(--line);background:var(--accent2);color:#f7fbff;font-size:32px}
</style></head><body><div class="app"><div class="head"><h1>Server Yard</h1><button class="gear">⚙</button></div><div class="list"><article class="card"><div class="row"><div><div class="name">ggh</div><div class="meta">Paper • 1.21</div></div><span class="state">Offline</span></div><div class="metrics"><div class="m">RAM<b>4.5 GB</b></div><div class="m">Console<b>Ready</b></div></div><div class="actions"><button class="start">Ignite</button><button class="stop" disabled>Cut</button><button>☰</button></div></article><article class="card"><div class="row"><div><div class="name">hvnj</div><div class="meta">Vanilla • 1.21.2</div></div><span class="state">Offline</span></div><div class="metrics"><div class="m">RAM<b>4.6 GB</b></div><div class="m">Console<b>Ready</b></div></div><div class="actions"><button class="start">Ignite</button><button class="stop" disabled>Cut</button><button>☰</button></div></article></div></div><button class="fab">＋</button>
<script>document.querySelectorAll('.card').forEach(c=>{const a=c.querySelector('.start'),b=c.querySelector('.stop'),s=c.querySelector('.state');a.onclick=()=>{a.disabled=true;b.disabled=false;s.textContent='Online';s.style.background='#cde3b1';};b.onclick=()=>{a.disabled=false;b.disabled=true;s.textContent='Offline';s.style.background='#ded9c4';};});</script></body></html>
