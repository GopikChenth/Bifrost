<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Settings</title>
<style>:root{--bg:#f2eedf;--paper:#fbf8ee;--ink:#1f2318;--line:#3f462f;--accent:#7aa64f}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:"IBM Plex Mono","JetBrains Mono",monospace;color:var(--ink)}.app{padding:52px 16px 94px}.app h1{margin:0 0 12px;font-size:32px}.card{margin-top:10px;border:2px solid var(--line);background:var(--paper);padding:10px}.t{font-size:22px;font-weight:700}.d{margin-top:6px;color:#4d553f}.row{margin-top:12px;display:flex;justify-content:space-between;align-items:center;gap:8px}.switch{width:66px;height:36px;border:2px solid var(--line);background:#d8d3be;position:relative}.switch::after{content:"";position:absolute;top:2px;left:2px;width:28px;height:28px;background:#f8f6ea;transition:.2s}.switch.on{background:#cde3b1}.switch.on::after{left:32px}.save{position:fixed;left:16px;right:16px;bottom:16px;min-height:54px;border:2px solid var(--line);background:var(--accent);font-size:20px;font-weight:700}
</style></head><body><div class="app"><h1>Settings</h1><section class="card"><div class="t">Storage Access</div><div class="d">Files are linked to /storage/emulated/0/Bifrost.</div></section><section class="card"><div class="t">Server Directory</div><div class="row"><span>Use default storage</span><button class="switch on"></button></div><div class="d" style="margin-top:10px">Active root:\n/storage/emulated/0/Bifrost</div></section><section class="card"><div class="t">Runtime</div><div class="row"><span>Auto restart after crash</span><button class="switch"></button></div></section></div><button class="save" id="save">Write Settings</button>
<script>document.querySelectorAll('.switch').forEach(s=>s.onclick=()=>s.classList.toggle('on'));document.getElementById('save').onclick=e=>{const t=e.target.textContent;e.target.textContent='Stored';setTimeout(()=>e.target.textContent=t,900);};</script>
</body></html>
