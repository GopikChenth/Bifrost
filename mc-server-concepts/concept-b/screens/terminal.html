<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Terminal</title>
<style>:root{--bg:#05080d;--surface:#0d141f;--fg:#daf2e6;--line:#27364f;--accent:#39d98a;--muted:#94a6c1}*{box-sizing:border-box}body{margin:0;background:#05080d;color:#daf2e6;font-family:"IBM Plex Sans","Segoe UI",sans-serif}.app{padding:52px 16px 92px}.head{display:flex;justify-content:space-between;align-items:center}.head h1{margin:0;color:#eaf2ff;font-size:34px}.pill{padding:8px 12px;border-radius:999px;background:#20324b;color:#bfd2ea;font-weight:700}.console{margin-top:12px;background:#02070f;border:1px solid #18314d;border-radius:14px;padding:14px;min-height:660px;font-family:"IBM Plex Mono",monospace;font-size:19px;line-height:1.45;white-space:pre-wrap;overflow:auto}.composer{position:fixed;left:16px;right:16px;bottom:16px;display:flex;gap:8px}.composer input{flex:1;min-height:50px;border:1px solid var(--line);border-radius:10px;background:#0f1827;color:#eaf2ff;padding:0 12px;font-size:17px}.composer button{min-height:50px;border:0;border-radius:10px;background:var(--accent);color:#0f2a1f;font-weight:800;padding:0 16px}</style>
</head><body><div class="app"><div class="head"><h1>ggh Terminal</h1><span class="pill">Offline</span></div><div class="console" id="out">[BIFROST/BOOT] ggh console bound\n[INFO] Type: Paper 1.21\n[INFO] Runtime: stopped\n\nNo stream yet.</div></div><form class="composer" id="f"><input id="i" placeholder="Type command: say Hello"/><button>Send</button></form>
<script>const f=document.getElementById('f'),i=document.getElementById('i'),o=document.getElementById('out');f.onsubmit=e=>{e.preventDefault();const v=i.value.trim();if(!v)return;o.textContent += `\n\n> ${v}\n[20:54:33] queued`;i.value='';o.scrollTop=o.scrollHeight;};</script>
</body></html>
