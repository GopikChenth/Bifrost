<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Server</title>
<style>:root{--bg:#060a11;--surface:#111826;--elev:#1a2638;--fg:#eaf2ff;--muted:#8da1bf;--line:#27364f;--accent:#39d98a;--danger:#ff676f}*{box-sizing:border-box}body{margin:0;background:linear-gradient(170deg,#0f1729,#060a11 45%);font-family:"IBM Plex Sans","Segoe UI",sans-serif;color:var(--fg)}.app{padding:52px 16px 90px}.nav{display:flex;justify-content:space-between;align-items:center}.badge{padding:7px 12px;border-radius:999px;background:#23324a;color:#c2d4eb;font-weight:700}.hero{margin-top:12px;border:1px solid var(--line);border-radius:18px;padding:16px;background:linear-gradient(135deg,#13233f,#173155)}.hero h1{margin:0;font-size:42px}.hero p{margin:6px 0 0;color:#9ab2d4}
.ctrl{margin-top:10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.ctrl button{min-height:48px;border:0;border-radius:10px;font-weight:700;color:#ecf3ff}.start{background:#1f6a4f}.stop{background:#5f2d36}.restart{background:#1f2c42}
.card{margin-top:10px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px}.ip{font-family:"IBM Plex Mono",monospace;font-size:28px;font-weight:700}.copy{min-height:48px;border:0;border-radius:10px;background:#20324b;color:#dce8fb;padding:0 14px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.tile{background:var(--elev);border:1px solid #314662;border-radius:10px;padding:10px}.tile b{display:block;margin-top:4px;font-size:22px}
</style></head><body><div class="app"><div class="nav"><div style="font-size:34px;font-weight:780">ggh</div><span class="badge" id="b">Offline</span></div><section class="hero"><h1>Local Node ggh</h1><p>Paper runtime • world sync enabled</p></section><div class="ctrl"><button id="start" class="start">Boot</button><button id="stop" class="stop" disabled>Halt</button><button id="restart" class="restart">Restart</button></div><section class="card"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center"><div><div style="color:var(--muted)">LAN endpoint</div><div class="ip" id="ip">100.104.51.112:25565</div></div><button id="copy" class="copy">Copy</button></div></section><section class="grid"><article class="tile">Players<b>0 / 20</b></article><article class="tile">RAM<b id="ram">0.8 / 4.5 GB</b></article><article class="tile">Tick rate<b>20 TPS</b></article><article class="tile">World save<b>12s ago</b></article></section></div>
<script>const st=document.getElementById('start'),sp=document.getElementById('stop'),badge=document.getElementById('b');st.onclick=()=>{st.disabled=true;sp.disabled=false;badge.textContent='Online';badge.style.background='#1f4f3b';badge.style.color='#9fe7c4';document.getElementById('ram').textContent='2.1 / 4.5 GB';};sp.onclick=()=>{st.disabled=false;sp.disabled=true;badge.textContent='Offline';badge.style.background='#23324a';badge.style.color='#c2d4eb';document.getElementById('ram').textContent='0.8 / 4.5 GB';};document.getElementById('restart').onclick=()=>{badge.textContent='Restarting';setTimeout(()=>{badge.textContent='Online';badge.style.background='#1f4f3b';badge.style.color='#9fe7c4';},700)};document.getElementById('copy').onclick=()=>navigator.clipboard?.writeText(document.getElementById('ip').textContent);</script>
</body></html>
