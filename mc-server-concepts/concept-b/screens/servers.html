<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Servers</title>
<style>
:root{--bg:#060a11;--surface:#111826;--elev:#1a2638;--fg:#eaf2ff;--muted:#8da1bf;--line:#27364f;--accent:#39d98a;--danger:#ff676f}*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#0d1523,#060a11 38%);font-family:"IBM Plex Sans","Segoe UI",sans-serif;color:var(--fg)}.app{padding:52px 16px 96px}.top{display:flex;justify-content:space-between;align-items:center}.top h1{margin:0;font-size:35px}.gear{width:48px;height:48px;border-radius:12px;border:1px solid var(--line);background:var(--surface);color:var(--fg)}
.stack{display:grid;gap:12px;margin-top:12px}.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.02)}.row{display:flex;justify-content:space-between;align-items:center}.name{font-size:28px;font-weight:760}.sub{color:var(--muted)}.state{padding:6px 10px;border-radius:999px;background:#243247;color:#c8d7ec;font-weight:700}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}.m{background:var(--elev);border:1px solid #2d3f5b;border-radius:10px;padding:8px}.m b{display:block;margin-top:4px;font-size:20px}
.actions{display:grid;grid-template-columns:1fr 1fr 44px;gap:8px}button{min-height:48px;border:0;border-radius:10px;color:var(--fg);font-weight:700}.start{background:#1d6a4f}.stop{background:#542730;color:#e6aab0}.menu{background:#1f2c42}
.fab{position:fixed;right:18px;bottom:18px;width:64px;height:64px;border-radius:18px;border:0;background:var(--accent);color:#0f2a1f;font-size:33px;font-weight:700}
</style></head>
<body><div class="app"><div class="top"><h1>Bifrost Grid</h1><button class="gear">⚙</button></div><div class="stack">
<article class="card"><div class="row"><div><div class="name">ggh</div><div class="sub">Paper • 1.21</div></div><span class="state">Offline</span></div><div class="metrics"><div class="m">RAM<b>4.5 GB</b></div><div class="m">Console<b>Ready</b></div></div><div class="actions"><button class="start">Boot</button><button class="stop" disabled>Halt</button><button class="menu">☰</button></div></article>
<article class="card"><div class="row"><div><div class="name">hvnj</div><div class="sub">Vanilla • 1.21.2</div></div><span class="state">Offline</span></div><div class="metrics"><div class="m">RAM<b>4.6 GB</b></div><div class="m">Console<b>Ready</b></div></div><div class="actions"><button class="start">Boot</button><button class="stop" disabled>Halt</button><button class="menu">☰</button></div></article>
</div></div><button class="fab">＋</button>
<script>document.querySelectorAll('.card').forEach(c=>{const s=c.querySelector('.start'),t=c.querySelector('.stop'),st=c.querySelector('.state');s.onclick=()=>{s.disabled=true;t.disabled=false;st.textContent='Online';st.style.background='#1f4f3b';st.style.color='#9fe7c4';};t.onclick=()=>{s.disabled=false;t.disabled=true;st.textContent='Offline';st.style.background='#243247';st.style.color='#c8d7ec';};});</script>
</body></html>
