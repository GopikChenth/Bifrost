<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Settings</title>
<style>:root{--bg:#060a11;--surface:#111826;--fg:#eaf2ff;--muted:#8da1bf;--line:#27364f;--accent:#39d98a}*{box-sizing:border-box}body{margin:0;background:#060a11;color:var(--fg);font-family:"IBM Plex Sans","Segoe UI",sans-serif}.app{padding:52px 16px 96px}.app h1{margin:0 0 12px;font-size:35px}.card{margin-top:10px;background:#111826;border:1px solid var(--line);border-radius:14px;padding:12px}.t{font-size:24px;font-weight:760}.d{margin-top:6px;color:var(--muted)}.row{margin-top:12px;display:flex;justify-content:space-between;align-items:center;gap:8px}.switch{width:64px;height:36px;border:0;border-radius:999px;background:#304766;position:relative}.switch::after{content:"";position:absolute;left:4px;top:4px;width:28px;height:28px;border-radius:999px;background:#fff;transition:.2s}.switch.on{background:#1f6a4f}.switch.on::after{left:32px}.save{position:fixed;left:16px;right:16px;bottom:16px;min-height:54px;border:0;border-radius:14px;background:var(--accent);font-size:20px;font-weight:800;color:#123024}
</style></head><body><div class="app"><h1>Settings</h1><section class="card"><div class="t">Storage</div><div class="d">Server files live under /storage/emulated/0/Bifrost.</div><div class="row"><span>Use default path</span><button class="switch on"></button></div></section><section class="card"><div class="t">Runtime Safety</div><div class="row"><span>Auto restart after crash</span><button class="switch"></button></div><div class="row"><span>Write command audit log</span><button class="switch on"></button></div></section></div><button class="save" id="save">Apply Settings</button>
<script>document.querySelectorAll('.switch').forEach(s=>s.onclick=()=>s.classList.toggle('on'));document.getElementById('save').onclick=e=>{const t=e.target.textContent;e.target.textContent='Applied';setTimeout(()=>e.target.textContent=t,900);};</script>
</body></html>
