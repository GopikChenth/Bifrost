<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>World</title>
<style>:root{--bg:#060a11;--surface:#111826;--fg:#eaf2ff;--muted:#8da1bf;--line:#27364f;--accent:#39d98a}*{box-sizing:border-box}body{margin:0;background:#060a11;color:var(--fg);font-family:"IBM Plex Sans","Segoe UI",sans-serif}.app{padding:52px 16px 28px}.app h1{margin:0;font-size:35px}.card{margin-top:12px;background:#111826;border:1px solid var(--line);border-radius:14px;padding:12px}.tools{display:grid;grid-template-columns:1fr 1fr;gap:8px}.tools button{min-height:48px;border:0;border-radius:10px;color:#dce8fb;font-weight:700;background:#1d2e46}.tools .primary{background:#1f6a4f;color:#d5ffe7}.rows{display:grid;gap:8px;margin-top:10px}.row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:#152238;border:1px solid #2b3f5e;border-radius:10px;padding:10px}.meta{color:var(--muted);font-size:14px}.ok{padding:7px 10px;border-radius:999px;background:#1f4f3b;color:#9fe7c4;font-size:12px;font-weight:700}progress{width:100%;height:12px;margin-top:10px}
</style></head><body><div class="app"><h1>World Ops</h1><section class="card"><div class="tools"><button id="backup" class="primary">Create Backup</button><button>Open Folder</button><button>Upload World</button><button>Generate Seed</button></div><progress id="prog" value="0" max="100" hidden></progress></section><section class="card"><div style="font-size:24px;font-weight:760">Recent Backups</div><div class="rows" id="rows"><article class="row"><div><strong>ggh_2026-05-18_2201.zip</strong><div class="meta">1.4 GB • local</div></div><span class="ok">Healthy</span></article></div></section></div>
<script>const b=document.getElementById('backup'),p=document.getElementById('prog'),rows=document.getElementById('rows');b.onclick=()=>{b.disabled=true;b.textContent='Running...';p.hidden=false;p.value=0;const t=setInterval(()=>{p.value+=10;if(p.value>=100){clearInterval(t);const n=new Date();const id=`${n.getHours()}${n.getMinutes()}${n.getSeconds()}`;const el=document.createElement('article');el.className='row';el.innerHTML=`<div><strong>ggh_2026-05-19_${id}.zip</strong><div class="meta">1.4 GB • local</div></div><span class="ok">Healthy</span>`;rows.prepend(el);b.disabled=false;b.textContent='Create Backup';setTimeout(()=>p.hidden=true,500);}},130);};</script>
</body></html>
