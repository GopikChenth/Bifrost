<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Players</title>
<style>:root{--bg:#060a11;--surface:#111826;--fg:#eaf2ff;--muted:#8da1bf;--line:#27364f;--accent:#39d98a;--danger:#ff676f}*{box-sizing:border-box}body{margin:0;background:#060a11;color:var(--fg);font-family:"IBM Plex Sans","Segoe UI",sans-serif}.app{padding:52px 16px 30px}.app h1{margin:0;font-size:35px}.tabs{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}.tab{min-height:48px;border:1px solid var(--line);border-radius:10px;background:#111826;color:#d6e4f8;padding:0 14px;font-weight:700}.tab.active{background:#1b3559}.panel{background:#0f1725;border:1px solid var(--line);border-radius:14px;padding:12px}.entry{display:flex;gap:8px}.entry input{flex:1;min-height:48px;border:1px solid #304766;border-radius:10px;background:#0c1320;color:#eaf2ff;padding:0 12px;font-size:18px}.add{min-height:48px;border:0;border-radius:10px;background:var(--accent);color:#112c22;font-weight:800}.list{display:grid;gap:8px;margin-top:12px}.item{display:flex;justify-content:space-between;align-items:center;background:#152238;border:1px solid #2d4060;border-radius:10px;padding:10px}.remove{min-height:38px;border:0;border-radius:8px;background:#4d2430;color:#ffb5bb;font-weight:700}
</style></head><body><div class="app"><h1>Access Control</h1><div class="tabs"><button class="tab active" data-k="whitelist">Whitelist</button><button class="tab" data-k="ops">Ops</button><button class="tab" data-k="ban">Blacklist</button></div><section class="panel"><div class="entry"><input id="name" placeholder="Player name"/><button class="add" id="add">Queue Add</button></div><div class="list" id="list"></div></section></div>
<script>const data={whitelist:['Alex','Noor'],ops:['AdminKai'],ban:[]};let k='whitelist';const list=document.getElementById('list');function draw(){list.innerHTML='';const rows=data[k];if(!rows.length){const e=document.createElement('div');e.className='item';e.textContent='No entries';list.append(e);return;}rows.forEach(n=>{const el=document.createElement('div');el.className='item';el.innerHTML=`<span>${n}</span>`;const b=document.createElement('button');b.className='remove';b.textContent='Remove';b.onclick=()=>{data[k]=data[k].filter(x=>x!==n);draw();};el.append(b);list.append(el);});}document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelector('.tab.active').classList.remove('active');t.classList.add('active');k=t.dataset.k;draw();});document.getElementById('add').onclick=()=>{const v=document.getElementById('name').value.trim();if(v&&!data[k].includes(v))data[k].push(v);document.getElementById('name').value='';draw();};draw();</script>
</body></html>
